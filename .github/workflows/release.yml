name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in script
        run: |
          sed -i "s/^VERSION=\".*\"/VERSION=\"${{ steps.get_version.outputs.VERSION }}\"/" install.sh

      - name: Make script executable
        run: chmod +x install.sh

      - name: Validate script syntax
        run: bash -n install.sh

      - name: Create checksums
        run: |
          sha256sum install.sh > checksums.txt
          md5sum install.sh >> checksums.txt

      - name: Generate release notes
        id: release_notes
        run: |
          cat << 'EOF' > release_notes.md
          ## Cloud Image Desktop VM Installer v${{ steps.get_version.outputs.VERSION }}

          ### Quick Install

          **Ubuntu (default):**
          ```bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.VERSION }}/install.sh | sudo bash -s -- \
            --password mypassword
          ```

          **Fedora:**
          ```bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.VERSION }}/install.sh | sudo bash -s -- \
            --distro fedora \
            --password mypassword
          ```

          Or download and run:

          ```bash
          wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.VERSION }}/install.sh
          chmod +x install.sh
          sudo ./install.sh --help
          ```

          ### Supported Distributions

          | Distribution | Version | Default Desktop |
          |--------------|---------|-----------------|
          | Ubuntu | 24.04 LTS | `ubuntu-desktop-minimal` (GNOME) |
          | Fedora | 41 | `@workstation-product-environment` (GNOME) |

          ### Features

          - Multi-distro support (Ubuntu and Fedora)
          - Cloud-init based configuration
          - Automatic installation of:
            - Google Chrome
            - Docker
            - Tailscale
            - Node.js (latest LTS)
            - VS Code
            - OpenClaw
          - XRDP for remote desktop access
          - SPICE graphics for local access
          - Host device passthrough support
          - Silent mode for automation

          ### Requirements

          - Linux host with KVM support
          - libvirt and virt-install
          - Root/sudo privileges
          - AMD64 architecture

          ### Options

          | Option | Description | Default |
          |--------|-------------|---------|
          | `-o, --distro` | Distribution (ubuntu, fedora) | ubuntu |
          | `-h, --hostname` | VM hostname | \<distro\>-desktop |
          | `-u, --username` | Username | user |
          | `-f, --fullname` | Full name of user | \<Distro\> User |
          | `-p, --password` | User password | (required) |
          | `-c, --vcpus` | Number of vCPUs | 4 |
          | `-r, --ram` | RAM in MB | 8192 |
          | `-d, --disk` | Disk size in GB | 50 |
          | `-n, --name` | VM name | \<distro\>-desktop-vm |
          | `-e, --desktop` | Desktop package | distro-specific |
          | `-b, --bridge` | Host bridge for networking | default NAT |
          | `-D, --hostdev` | Device passthrough (repeatable) | none |
          | `-s, --silent` | Silent install | false |
          | `--remove` | Remove VM and storage | - |

          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            install.sh
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test Script
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate bash syntax
        run: bash -n install.sh

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning

      - name: Test help output
        run: |
          chmod +x install.sh
          # Test that help works (script exits 0 on --help)
          ./install.sh --help

      - name: Test version output
        run: ./install.sh --version
